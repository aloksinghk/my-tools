<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Tools Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
    }

    header {
      background: #111827;
      color: white;
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters button {
      padding: 8px 14px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background: #e5e7eb;
    }

    .filters button.active {
      background: #2563eb;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      transition: 0.2s;
      position: relative;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 30px;
    }

    .title {
      font-weight: bold;
      margin: 8px 0;
    }

    .category {
      font-size: 12px;
      color: gray;
    }

    .open {
      display: inline-block;
      margin-top: 10px;
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }

    .fav {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      font-size: 20px;
    }

  </style>
</head>

<body>

<header>🚀 Dynamic Tools Hub</header>

<div class="container">

  <input id="searchBox" placeholder="Search tools..." />

  <div id="filters" class="filters"></div>

  <div id="tools" class="grid"></div>

</div>

<script>
let toolsData = [];
let activeCategory = "All";

const icons = {
  HTML: "🌐",
  SEO: "📈",
  Design: "🎨",
  JSON: "🧩",
  Utility: "🛠️",
  Converter: "🔄"
};

// Load tools
fetch('tools.json')
  .then(res => res.json())
  .then(data => {
    toolsData = data;
    renderFilters();
    renderTools();
  });

// Render filters
function renderFilters() {
  const container = document.getElementById("filters");

  // 🔥 FIX: clear previous buttons
  container.innerHTML = "";

  const categories = ["All", ...new Set(toolsData.map(t => t.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;

    if (cat === activeCategory) btn.classList.add("active");

    btn.onclick = () => {
      activeCategory = cat;
      renderFilters();
      renderTools();
    };

    container.appendChild(btn);
  });
}

// Render tools
function renderTools() {
  const container = document.getElementById("tools");
  container.innerHTML = "";

  const search = document.getElementById("searchBox").value.toLowerCase();

  const filtered = toolsData.filter(t =>
    (activeCategory === "All" || t.category === activeCategory) &&
    t.name.toLowerCase().includes(search)
  );

  filtered.forEach(tool => {
    const fav = isFav(tool.file);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="fav" onclick="toggleFav('${tool.file}')">
        ${fav ? "⭐" : "☆"}
      </div>

      <div class="icon">${icons[tool.category] || "⚙️"}</div>

      <div class="title">${tool.name}</div>
      <div class="category">${tool.category}</div>

      <a href="${tool.file}" class="open">Open →</a>
    `;

    container.appendChild(div);
  });
}

// Search
document.getElementById("searchBox").addEventListener("input", renderTools);

// Favorites
function getFavs() {
  return JSON.parse(localStorage.getItem("favTools") || "[]");
}

function isFav(file) {
  return getFavs().includes(file);
}

function toggleFav(file) {
  let favs = getFavs();

  if (favs.includes(file)) {
    favs = favs.filter(f => f !== file);
  } else {
    favs.push(file);
  }

  localStorage.setItem("favTools", JSON.stringify(favs));
  renderTools();
}
</script>

</body>
</html>
