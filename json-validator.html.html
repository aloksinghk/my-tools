<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JSON Comparator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:         #F7F8FC;
  --surface:    #FFFFFF;
  --surface2:   #F0F2FA;
  --surface3:   #E8EBF7;
  --border:     #DDE1F0;
  --border2:    #C8CEDE;

  --text:       #1A1D2E;
  --text2:      #4A5068;
  --text3:      #8B92AD;

  --blue:       #4361EE;
  --blue-light: #EEF1FD;
  --blue-mid:   #C5CEFC;

  --green:      #2BB5A0;
  --green-light:#E8F8F6;
  --green-mid:  #A8E6DF;

  --red:        #E05263;
  --red-light:  #FDEEF0;
  --red-mid:    #F8BDC4;

  --amber:      #F59E0B;
  --amber-light:#FEF3C7;
  --amber-mid:  #FCD89A;

  --violet:     #7C3AED;
  --violet-light:#EDE9FE;

  --radius-sm:  6px;
  --radius:     10px;
  --radius-lg:  14px;
  --radius-xl:  20px;

  --shadow-sm:  0 1px 3px rgba(67,97,238,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow:     0 4px 16px rgba(67,97,238,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg:  0 8px 32px rgba(67,97,238,0.12), 0 2px 8px rgba(0,0,0,0.06);

  --sans: 'Plus Jakarta Sans', sans-serif;
  --mono: 'Fira Code', monospace;
}

html{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── Decorative BG ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(67,97,238,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 90% 100%, rgba(43,181,160,0.05) 0%, transparent 70%);
}

/* ── Header ── */
header{
  position:relative;z-index:10;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#4361EE 0%,#7C3AED 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(67,97,238,0.35);
}
.logo-mark svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
.logo-name em{font-style:normal;color:var(--blue)}
.header-tag{
  font-family:var(--mono);font-size:11px;color:var(--text3);
  background:var(--surface2);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;letter-spacing:0.02em;
}

/* ── Main ── */
main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:1.75rem 2rem 2.5rem;gap:1.25rem;max-width:1440px;width:100%;margin:0 auto}

/* ── Section label ── */
.section-label{
  font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Editors ── */
.editors{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);
  overflow:hidden;display:flex;flex-direction:column;
  transition:box-shadow 0.2s,border-color 0.2s;
}
.panel:focus-within{border-color:var(--blue-mid);box-shadow:var(--shadow)}

.panel-head{
  padding:11px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.panel-id{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--text)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-a{background:var(--blue)}
.dot-b{background:var(--amber)}

.badge{font-size:10px;font-family:var(--mono);font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:0.03em;transition:all 0.2s}
.badge-empty{background:var(--surface3);border:1px solid var(--border2);color:var(--text3)}
.badge-ok{background:var(--green-light);border:1px solid var(--green-mid);color:var(--green)}
.badge-err{background:var(--red-light);border:1px solid var(--red-mid);color:var(--red)}

textarea{
  flex:1;min-height:210px;resize:vertical;
  background:#fff;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:12.5px;
  line-height:1.7;padding:14px 16px;
  caret-color:var(--blue);
}
textarea::placeholder{color:var(--text3)}

.panel-foot{
  border-top:1px solid var(--border);
  padding:6px 16px;min-height:26px;
  background:var(--surface2);
}
.err-msg{font-size:11px;font-family:var(--mono);color:var(--red)}

/* ── Action bar ── */
.action-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.btn-compare{
  font-family:var(--sans);font-size:13px;font-weight:700;
  padding:10px 26px;
  background:linear-gradient(135deg,#4361EE 0%,#7C3AED 100%);
  color:#fff;border:none;border-radius:var(--radius);
  cursor:pointer;
  box-shadow:0 4px 14px rgba(67,97,238,0.35);
  transition:transform 0.15s,box-shadow 0.15s;
  display:flex;align-items:center;gap:8px;
}
.btn-compare:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(67,97,238,0.42)}
.btn-compare:active{transform:scale(0.97)}
.btn-compare svg{width:15px;height:15px}

.btn-clear{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:10px 18px;
  background:var(--surface);color:var(--text2);
  border:1px solid var(--border2);border-radius:var(--radius);
  cursor:pointer;transition:all 0.15s;
}
.btn-clear:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}

.kbd-hint{
  font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto;
  display:flex;align-items:center;gap:5px;
}
kbd{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:4px;padding:2px 6px;font-size:10px;
  font-family:var(--mono);color:var(--text2);
}

/* ── Results ── */
.results{display:none;flex-direction:column;gap:1rem}
.results.visible{display:flex}

/* ── Metrics ── */
.metrics{display:flex;gap:10px;flex-wrap:wrap}
.metric{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);
  padding:14px 20px;min-width:100px;
  display:flex;flex-direction:column;gap:4px;
}
.metric-val{font-size:28px;font-weight:700;line-height:1;letter-spacing:-0.02em}
.metric-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.04em}
.m-total .metric-val{color:var(--text)}
.m-same .metric-val{color:var(--green)}
.m-diff .metric-val{color:var(--red)}
.m-only-a .metric-val{color:var(--blue)}
.m-only-b .metric-val{color:var(--amber)}

/* ── Controls ── */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex-wrap:wrap}

.filter-btn{
  font-family:var(--sans);font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text2);
  cursor:pointer;transition:all 0.15s;
}
.filter-btn:hover{background:var(--surface2)}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(67,97,238,0.3)}
.filter-btn.f-same.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 8px rgba(43,181,160,0.3)}
.filter-btn.f-different.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(224,82,99,0.3)}
.filter-btn.f-only-a.active{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-btn.f-only-b.active{background:var(--amber);border-color:var(--amber);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.3)}

.search-wrap{margin-left:auto}
.search-box{
  position:relative;display:flex;align-items:center;
}
.search-box svg{position:absolute;left:10px;width:14px;height:14px;stroke:var(--text3);stroke-width:2;fill:none;pointer-events:none}
.search-box input{
  font-family:var(--sans);font-size:13px;
  padding:7px 12px 7px 32px;width:220px;
  background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--radius);
  outline:none;transition:all 0.2s;
  box-shadow:var(--shadow-sm);
}
.search-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(67,97,238,0.12)}
.search-box input::placeholder{color:var(--text3)}

/* ── Table ── */
.table-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  overflow:hidden;overflow-x:auto;
}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:600px}

thead{background:var(--surface2)}
th{
  padding:11px 16px;text-align:left;
  font-size:11px;font-weight:600;
  color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;
  border-bottom:2px solid var(--border);
}

td{
  padding:10px 16px;font-size:12.5px;
  border-bottom:1px solid var(--border);
  vertical-align:top;word-break:break-word;
  transition:background 0.1s;
}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--blue-light)}

/* group header */
tr.grp td{
  background:var(--surface2);
  font-size:11px;font-weight:700;letter-spacing:0.06em;
  color:var(--text3);text-transform:uppercase;
  padding:5px 16px;border-bottom:1px solid var(--border);
}
tr.grp td .grp-name{color:var(--blue);font-family:var(--mono);font-size:12px}
tr.grp td .grp-meta{color:var(--text3);font-size:10px;font-weight:400}

col.ck{width:30%} col.cs{width:13%} col.ca{width:28%} col.cb{width:29%}

/* keys */
.kpath{font-family:var(--mono);font-size:11px;color:var(--text3)}
.kleaf{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text)}

/* pills */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.03em}
.p-same{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.p-diff{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
.p-oa{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid)}
.p-ob{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid)}

/* values */
.val{font-family:var(--mono);font-size:12px}
.v-null{color:var(--text3)}
.v-bool{color:var(--violet)}
.v-num{color:#E67E22}
.v-str{color:var(--text)}
.v-a{color:var(--blue)}
.v-b{color:#D97706}
.v-miss{color:var(--text3);font-style:italic}

.no-rows{padding:48px;text-align:center;color:var(--text3);font-size:14px}
.no-rows strong{display:block;font-size:16px;margin-bottom:4px;color:var(--text2)}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--blue-mid)}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.results.visible{animation:fadeUp 0.3s ease}

@media(max-width:700px){
  .editors{grid-template-columns:1fr}
  main{padding:1rem}
  .controls{flex-direction:column;align-items:flex-start}
  .search-wrap{margin-left:0;width:100%}
  .search-box input{width:100%}
  .kbd-hint{display:none}
  header{padding:0 1rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20"><path d="M3 5h5M3 10h5M3 15h5"/><path d="M12 5h5M12 10h5M12 15h5"/><line x1="10" y1="3" x2="10" y2="17"/></svg>
    </div>
    <div class="logo-name">JSON <em>Comparator</em></div>
  </div>
  <div class="header-tag">deep diff · array-aware · order-independent</div>
</header>

<main>
  <!-- Editors -->
  <div>
    <div class="section-label">Input</div>
    <div class="editors">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-id"><div class="dot dot-a"></div>JSON A</div>
          <span class="badge badge-empty" id="badge-a">empty</span>
        </div>
        <textarea id="ta-a" placeholder="Paste your first JSON here…&#10;&#10;Example:&#10;{&#10;  &quot;name&quot;: &quot;Alice&quot;,&#10;  &quot;roles&quot;: [&quot;admin&quot;, &quot;user&quot;]&#10;}"></textarea>
        <div class="panel-foot"><div class="err-msg" id="err-a"></div></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-id"><div class="dot dot-b"></div>JSON B</div>
          <span class="badge badge-empty" id="badge-b">empty</span>
        </div>
        <textarea id="ta-b" placeholder="Paste your second JSON here…&#10;&#10;Example:&#10;{&#10;  &quot;name&quot;: &quot;Bob&quot;,&#10;  &quot;roles&quot;: [&quot;user&quot;]&#10;}"></textarea>
        <div class="panel-foot"><div class="err-msg" id="err-b"></div></div>
      </div>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn-compare" id="btn-compare">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      Compare
    </button>
    <button class="btn-clear" id="btn-clear">Clear all</button>
    <div class="kbd-hint">
      <kbd>Ctrl</kbd><span>+</span><kbd>Enter</kbd><span style="margin-left:2px">to compare</span>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">

    <div>
      <div class="section-label">Summary</div>
      <div class="metrics" id="metrics"></div>
    </div>

    <div>
      <div class="section-label">Detailed comparison</div>
      <div class="controls">
        <div class="filters" id="filters">
          <button class="filter-btn active" data-f="all">All</button>
          <button class="filter-btn f-same" data-f="same">Same</button>
          <button class="filter-btn f-different" data-f="different">Different</button>
          <button class="filter-btn f-only-a" data-f="only-a">Only in A</button>
          <button class="filter-btn f-only-b" data-f="only-b">Only in B</button>
        </div>
        <div class="search-wrap">
          <div class="search-box">
            <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><path d="M10 10l3 3"/></svg>
            <input type="text" id="search" placeholder="Search parameter…"/>
          </div>
        </div>
      </div>

      <div style="margin-top:10px" class="table-card">
        <table>
          <colgroup><col class="ck"><col class="cs"><col class="ca"><col class="cb"></colgroup>
          <thead>
            <tr>
              <th>Parameter</th>
              <th>Status</th>
              <th>Value — A</th>
              <th>Value — B</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const taA=$('ta-a'),taB=$('ta-b'),errA=$('err-a'),errB=$('err-b');
  const bA=$('badge-a'),bB=$('badge-b');
  const resultsEl=$('results'),metricsEl=$('metrics'),tbody=$('tbody');
  const searchIn=$('search'),filtersEl=$('filters');
  let allRows=[],activeFilter='all',searchQuery='';

  function tryParse(s){
    s=s.trim();
    if(!s)return{ok:false,empty:true};
    try{return{ok:true,val:JSON.parse(s)};}
    catch(e){return{ok:false,err:e.message};}
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  /* Deep flatten — objects, arrays, primitives */
  function flatten(node){
    const out={};
    function walk(n,p){
      if(n===null||typeof n!=='object'){out[p]=n;return;}
      if(Array.isArray(n)){
        if(!n.length){out[p]='[]';return;}
        n.forEach((x,i)=>walk(x,p+'['+i+']'));return;
      }
      const ks=Object.keys(n);
      if(!ks.length){out[p]='{}';return;}
      ks.forEach(k=>walk(n[k],p?p+'.'+k:k));
    }
    walk(node,'');
    return out;
  }

  /* Live validation */
  function lv(ta,err,badge){
    const v=ta.value.trim();
    if(!v){err.textContent='';badge.className='badge badge-empty';badge.textContent='empty';return;}
    const r=tryParse(v);
    if(r.ok){err.textContent='';badge.className='badge badge-ok';badge.textContent='valid JSON';}
    else{err.textContent=r.err;badge.className='badge badge-err';badge.textContent='invalid';}
  }
  taA.addEventListener('input',()=>lv(taA,errA,bA));
  taB.addEventListener('input',()=>lv(taB,errB,bB));

  /* Compare */
  function compare(){
    const rA=tryParse(taA.value),rB=tryParse(taB.value);
    let blocked=false;
    if(rA.empty){errA.textContent='Please paste JSON A.';bA.className='badge badge-err';bA.textContent='empty';blocked=true;}
    else if(!rA.ok){errA.textContent=rA.err;bA.className='badge badge-err';bA.textContent='invalid';blocked=true;}
    if(rB.empty){errB.textContent='Please paste JSON B.';bB.className='badge badge-err';bB.textContent='empty';blocked=true;}
    else if(!rB.ok){errB.textContent=rB.err;bB.className='badge badge-err';bB.textContent='invalid';blocked=true;}
    if(blocked)return;

    const fA=flatten(rA.val),fB=flatten(rB.val);
    const keys=Array.from(new Set([...Object.keys(fA),...Object.keys(fB)]))
      .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));

    allRows=keys.map(k=>{
      const inA=k in fA,inB=k in fB;
      let st;
      if(inA&&inB)st=JSON.stringify(fA[k])===JSON.stringify(fB[k])?'same':'different';
      else if(inA)st='only-a';
      else st='only-b';
      return{key:k,status:st,valA:fA[k],valB:fB[k]};
    });

    activeFilter='all';searchIn.value='';searchQuery='';
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
    renderMetrics();renderTable();
    resultsEl.className='results visible';
    setTimeout(()=>resultsEl.scrollIntoView({behavior:'smooth',block:'start'}),50);
  }

  /* Metrics */
  function renderMetrics(){
    const same=allRows.filter(r=>r.status==='same').length;
    const diff=allRows.filter(r=>r.status==='different').length;
    const oA=allRows.filter(r=>r.status==='only-a').length;
    const oB=allRows.filter(r=>r.status==='only-b').length;
    metricsEl.innerHTML=`
      <div class="metric m-total"><div class="metric-val">${allRows.length}</div><div class="metric-label">Total keys</div></div>
      <div class="metric m-same"><div class="metric-val">${same}</div><div class="metric-label">Identical</div></div>
      <div class="metric m-diff"><div class="metric-val">${diff}</div><div class="metric-label">Different</div></div>
      <div class="metric m-only-a"><div class="metric-val">${oA}</div><div class="metric-label">Only in A</div></div>
      <div class="metric m-only-b"><div class="metric-val">${oB}</div><div class="metric-label">Only in B</div></div>`;
  }

  /* Value renderer */
  function rv(v,side){
    const sc=side==='a'?'v-a':side==='b'?'v-b':'';
    if(v===undefined)return'<span class="val v-miss">—</span>';
    if(v===null)return`<span class="val v-null ${sc}">null</span>`;
    if(v==='[]')return`<span class="val v-null ${sc}">[ ] empty array</span>`;
    if(v==='{}')return`<span class="val v-null ${sc}">{ } empty object</span>`;
    if(typeof v==='boolean')return`<span class="val v-bool ${sc}">${v}</span>`;
    if(typeof v==='number')return`<span class="val v-num ${sc}">${v}</span>`;
    return`<span class="val v-str ${sc}">${esc(String(v))}</span>`;
  }

  /* Key renderer */
  function rk(k){
    let idx=-1;
    for(let i=k.length-1;i>=0;i--){if(k[i]==='.'||k[i]==='['){idx=i;break;}}
    if(idx<=0)return`<span class="kleaf">${esc(k)}</span>`;
    return`<span class="kpath">${esc(k.slice(0,idx))}</span><span class="kleaf">${esc(k.slice(idx))}</span>`;
  }

  const pills={
    same:'<span class="pill p-same">same</span>',
    different:'<span class="pill p-diff">different</span>',
    'only-a':'<span class="pill p-oa">only A</span>',
    'only-b':'<span class="pill p-ob">only B</span>',
  };

  /* Table */
  function renderTable(){
    const rows=allRows.filter(r=>{
      if(activeFilter!=='all'&&r.status!==activeFilter)return false;
      if(searchQuery&&!r.key.toLowerCase().includes(searchQuery))return false;
      return true;
    });
    if(!rows.length){
      tbody.innerHTML='<tr><td colspan="4"><div class="no-rows"><strong>Nothing to show</strong>No parameters match the current filter.</div></td></tr>';
      return;
    }
    let lastTop=null,html=[];
    rows.forEach(r=>{
      const top=r.key.split(/[\.\[]/)[0];
      if(top!==lastTop){
        lastTop=top;
        const total=rows.filter(x=>x.key.split(/[\.\[]/)[0]===top).length;
        const diffs=rows.filter(x=>x.key.split(/[\.\[]/)[0]===top&&x.status!=='same').length;
        html.push(`<tr class="grp"><td colspan="4"><span class="grp-name">${esc(top)}</span>&ensp;<span class="grp-meta">${total} key${total!==1?'s':''}${diffs?' · '+diffs+' difference'+(diffs>1?'s':''):' · all identical'}</span></td></tr>`);
      }
      let vA,vB;
      if(r.status==='same'){vA=rv(r.valA,'');vB=rv(r.valB,'');}
      else if(r.status==='different'){vA=rv(r.valA,'a');vB=rv(r.valB,'b');}
      else if(r.status==='only-a'){vA=rv(r.valA,'a');vB='<span class="val v-miss">—</span>';}
      else{vA='<span class="val v-miss">—</span>';vB=rv(r.valB,'b');}
      html.push(`<tr><td>${rk(r.key)}</td><td>${pills[r.status]}</td><td>${vA}</td><td>${vB}</td></tr>`);
    });
    tbody.innerHTML=html.join('');
  }

  /* Events */
  $('btn-compare').addEventListener('click',compare);
  $('btn-clear').addEventListener('click',()=>{
    taA.value='';taB.value='';
    errA.textContent='';errB.textContent='';
    bA.className='badge badge-empty';bA.textContent='empty';
    bB.className='badge badge-empty';bB.textContent='empty';
    resultsEl.className='results';allRows=[];
  });
  filtersEl.addEventListener('click',e=>{
    const btn=e.target.closest('.filter-btn');
    if(!btn)return;
    activeFilter=btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
    renderTable();
  });
  searchIn.addEventListener('input',e=>{searchQuery=e.target.value.trim().toLowerCase();renderTable();});
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();compare();}});
})();
</script>
</body>
</html>
